name: PR Check

on:
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./createpayment/... ./getbalances/... ./gettransactions/...

      - name: Test
        run: go test ./createpayment/... ./getbalances/... ./gettransactions/... -v -count=1 -race -timeout 60s

      - name: Build createpayment
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o /dev/null ./createpayment/cmd/

      - name: Build getbalances
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o /dev/null ./getbalances/cmd/

      - name: Build gettransactions
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o /dev/null ./gettransactions/cmd/
