services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: draftea
      POSTGRES_PASSWORD: draftea
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U draftea -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  createpayment:
    build:
      context: .
      dockerfile: createpayment/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: draftea
      DB_PASSWORD: draftea
      DB_NAME: payments
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
